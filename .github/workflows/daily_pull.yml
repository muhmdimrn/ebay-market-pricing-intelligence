name: Daily eBay Pull

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  pull-and-load:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull data dari eBay Browse API
        env:
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
        run: python ebay_browse_api.py

      - name: Insert raw data ke Supabase
        env:
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
        run: python insert_raw.py ebay_latest.json

      - name: Transform dan load ke clean table
        env:
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
        run: python transform_load.py
